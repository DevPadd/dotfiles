# BACKGROUND
background {
    monitor =
    path = screenshot
    blur_passes = 6
    blur_size = 0
    brightness = 0.2
}

# GENERAL
general {
    no_fade_in = false
    grace = 2
    disable_loading_bar = true
}



# TIME
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1)
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    position = 0, -250
    halign = center
    valign = top
}


# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 1
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255,255,255, 0.1)
    inner_color = rgba(0,0,0,0.6)
    font_color = rgb(255,255,255)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text =
    hide_input = false
    position = 0, 0
    halign = center
    valign = center
    rounding = 50
}

